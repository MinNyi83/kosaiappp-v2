<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jobs Dashboard - Awesome Myanmar</title>
    <link rel="stylesheet" href="tailwind.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Theme Variables */
      :root, [data-theme="dark"] {
        --bg-body: radial-gradient(ellipse at top right, rgba(245, 158, 11, 0.06), transparent 50%),
          radial-gradient(ellipse at bottom left, rgba(99, 102, 241, 0.06), transparent 45%), #09090b;
        --bg-surface: #0c0c10;
        --bg-card: linear-gradient(145deg, rgba(20, 20, 28, 0.75) 0%, rgba(12, 12, 18, 0.85) 100%);
        --bg-input: rgba(0, 0, 0, 0.45);
        --border-subtle: rgba(255, 255, 255, 0.06);
        --border-medium: rgba(255, 255, 255, 0.1);
        --border-strong: rgba(255, 255, 255, 0.15);
        --text-primary: #ffffff;
        --text-secondary: #e2e8f0;
        --text-muted: #94a3b8;
        --text-dim: #64748b;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      [data-theme="light"] {
        --bg-body: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 50%, #f1f5f9 100%);
        --bg-surface: #ffffff;
        --bg-card: linear-gradient(145deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 250, 252, 0.98) 100%);
        --bg-input: rgba(241, 245, 249, 0.9);
        --border-subtle: rgba(0, 0, 0, 0.06);
        --border-medium: rgba(0, 0, 0, 0.1);
        --border-strong: rgba(0, 0, 0, 0.15);
        --text-primary: #0f172a;
        --text-secondary: #1e293b;
        --text-muted: #475569;
        --text-dim: #94a3b8;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1);
      }
      /* Light mode overrides for hardcoded Tailwind classes */
      [data-theme="light"] .text-white { color: var(--text-primary) !important; }
      [data-theme="light"] .text-slate-200 { color: var(--text-secondary) !important; }
      [data-theme="light"] .text-slate-300 { color: var(--text-secondary) !important; }
      [data-theme="light"] .text-slate-400 { color: var(--text-muted) !important; }
      [data-theme="light"] .text-slate-500 { color: var(--text-dim) !important; }
      [data-theme="light"] .hover\:text-white:hover { color: var(--text-primary) !important; }
      [data-theme="light"] .bg-black\/30 { background: rgba(255, 255, 255, 0.8) !important; }
      [data-theme="light"] .bg-black\/40 { background: var(--bg-input) !important; }
      [data-theme="light"] .bg-black\/50 { background: rgba(241, 245, 249, 0.9) !important; }
      [data-theme="light"] .bg-white\/5 { background: rgba(0, 0, 0, 0.03) !important; }
      [data-theme="light"] .border-white\/5 { border-color: var(--border-subtle) !important; }
      [data-theme="light"] .border-white\/10 { border-color: var(--border-medium) !important; }
      [data-theme="light"] header { background: rgba(255, 255, 255, 0.85) !important; border-color: var(--border-subtle) !important; backdrop-filter: blur(20px) !important; }
      [data-theme="light"] footer { background: rgba(248, 250, 252, 0.9) !important; border-color: var(--border-subtle) !important; }

      * {
        scroll-behavior: smooth;
      }

      html {
        scroll-padding-top: 80px;
        scroll-behavior: smooth;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: var(--bg-body);
        background-attachment: fixed;
        color: var(--text-secondary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.3); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(245, 158, 11, 0.5); }

      .glass-panel {
        background: var(--bg-card);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--border-subtle);
        box-shadow: var(--shadow-md);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }

      .glass-panel::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.3), transparent);
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .glass-panel:hover {
        border-color: rgba(245, 158, 11, 0.25);
        box-shadow: var(--shadow-lg), 0 0 30px rgba(245, 158, 11, 0.1);
        transform: translateY(-4px) scale(1.01);
      }

      .glass-panel:hover::before {
        opacity: 1;
      }

      /* Theme-aware inputs */
      input[type='text'], input[type='password'], input[type='number'], select, textarea {
        background: var(--bg-input) !important;
        border: 1px solid var(--border-medium) !important;
        color: var(--text-primary) !important;
      }
      input::placeholder, textarea::placeholder {
        color: var(--text-dim) !important;
      }

      /* Scroll Reveal Animations */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
      .reveal-delay-1 { transition-delay: 0.1s; }
      .reveal-delay-2 { transition-delay: 0.2s; }
      .reveal-delay-3 { transition-delay: 0.3s; }
      .reveal-delay-4 { transition-delay: 0.4s; }
      .reveal-title {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .reveal-title.active {
        opacity: 1;
        transform: translateY(0);
      }

      /* Smooth theme transition */
      body, .glass-panel, header, footer, nav, main, .filter-btn, .fade-in {
        transition: background-color 0.4s ease, background 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      }

      .status-pending {
        background: rgba(251, 191, 36, 0.15);
        color: #fbbf24;
        border: 1px solid rgba(251, 191, 36, 0.3);
      }
      .status-in-progress {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
        border: 1px solid rgba(59, 130, 246, 0.3);
      }
      .status-completed {
        background: rgba(34, 197, 94, 0.15);
        color: #4ade80;
        border: 1px solid rgba(34, 197, 94, 0.3);
      }
      .status-cancelled {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }

      .filter-btn.active {
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
        border-color: rgba(245, 158, 11, 0.5);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body class="text-slate-200 min-h-screen">
    <!-- Header -->
    <header class="border-b border-white/5 bg-black/30 backdrop-blur-md sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
          <span class="text-amber-500 text-xl">⚙️</span>
          <span class="font-extrabold text-white tracking-wider text-sm uppercase"
            >Awesome Myanmar</span
          >
        </div>
        <nav class="flex items-center gap-4 text-xs font-bold uppercase tracking-wider">
          <a href="/" class="text-slate-400 hover:text-white transition">Home</a>
          <a href="/jobs.html" class="text-amber-500">Jobs</a>
          <a href="/portal.html" class="text-slate-400 hover:text-white transition">Portal</a>
          <button id="theme-toggle" onclick="toggleTheme()" class="flex items-center gap-2 px-3 py-2 rounded-xl transition-all bg-amber-500/10 border border-amber-500/30 hover:bg-amber-500/20 text-amber-500" title="Toggle Dark/Light Mode" aria-label="Toggle theme">
            <svg id="theme-icon-dark" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
            <svg id="theme-icon-light" class="w-4 h-4 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            <span class="text-[10px] font-bold uppercase tracking-wider">Theme</span>
          </button>
          <a
            href="/admin.html"
            class="bg-amber-500/10 border border-amber-500/30 hover:bg-amber-500/20 text-amber-500 px-3 py-1.5 rounded-lg transition"
            >Admin</a
          >
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
      <!-- Stats Cards -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="glass-panel p-4 rounded-xl text-center">
          <p class="text-2xl font-black text-white" id="total-jobs">0</p>
          <p class="text-xs text-slate-400 uppercase tracking-wider">Total Jobs</p>
        </div>
        <div class="glass-panel p-4 rounded-xl text-center">
          <p class="text-2xl font-black text-yellow-400" id="pending-jobs">0</p>
          <p class="text-xs text-slate-400 uppercase tracking-wider">Pending</p>
        </div>
        <div class="glass-panel p-4 rounded-xl text-center">
          <p class="text-2xl font-black text-blue-400" id="in-progress-jobs">0</p>
          <p class="text-xs text-slate-400 uppercase tracking-wider">In Progress</p>
        </div>
        <div class="glass-panel p-4 rounded-xl text-center">
          <p class="text-2xl font-black text-green-400" id="completed-jobs">0</p>
          <p class="text-xs text-slate-400 uppercase tracking-wider">Completed</p>
        </div>
      </div>

      <!-- Filters -->
      <div class="flex flex-wrap gap-2 mb-6">
        <button
          onclick="filterJobs('all')"
          class="filter-btn active px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 transition"
          data-filter="all"
        >
          All
        </button>
        <button
          onclick="filterJobs('Pending')"
          class="filter-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition"
          data-filter="Pending"
        >
          Pending
        </button>
        <button
          onclick="filterJobs('In Progress')"
          class="filter-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition"
          data-filter="In Progress"
        >
          In Progress
        </button>
        <button
          onclick="filterJobs('Completed')"
          class="filter-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition"
          data-filter="Completed"
        >
          Completed
        </button>
        <button
          onclick="filterJobs('Cancelled')"
          class="filter-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition"
          data-filter="Cancelled"
        >
          Cancelled
        </button>
      </div>

      <!-- Search -->
      <div class="mb-6">
        <input
          name="search-input"
          type="text"
          id="search-input"
          placeholder="Search by Job ID, Client, or Technician..."
          class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:border-amber-500 transition"
        />
      </div>

      <!-- Jobs List -->
      <div id="jobs-container" class="space-y-4">
        <div class="text-center py-16">
          <div class="animate-pulse text-amber-500 font-bold uppercase text-xs tracking-widest">
            Loading jobs...
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden text-center py-16">
        <div class="text-4xl mb-4">📋</div>
        <p class="text-slate-400 text-sm">No jobs found</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 bg-gradient-to-b from-transparent to-black/20 py-12 md:py-8 mt-8">
      <div class="max-w-6xl mx-auto px-6 md:px-4 text-center space-y-6">
        <div class="flex items-center justify-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-amber-500/10 border border-amber-500/30 flex items-center justify-center">
            <span class="text-amber-500 text-lg">⚙️</span>
          </div>
          <span class="font-extrabold text-white tracking-wider uppercase text-sm">Awesome Myanmar</span>
        </div>
        <div class="flex flex-wrap items-center justify-center gap-4 text-[11px] text-slate-400 uppercase tracking-wider font-semibold">
          <a href="/" class="hover:text-amber-400 transition-colors">Home</a>
          <span class="text-slate-600">·</span>
          <a href="/jobs.html" class="hover:text-amber-400 transition-colors">Jobs</a>
          <span class="text-slate-600">·</span>
          <a href="/portal.html" class="hover:text-amber-400 transition-colors">Portal</a>
          <span class="text-slate-600">·</span>
          <a href="/admin.html" class="hover:text-amber-400 transition-colors">Admin</a>
        </div>
        <div class="border-t border-white/5 pt-6">
          <p class="text-[11px] text-slate-500">
            &copy; 2026 Awesome Myanmar CCTV & Network Infrastructure Solutions. All rights reserved.
          </p>
        </div>
      </div>
    </footer>

    <script>
      const API_BASE_URL = window.location.origin;
      let allJobs = [];
      let currentFilter = 'all';

      async function fetchJobs() {
        try {
          const res = await fetch(`${API_BASE_URL}/api/jobs`);
          if (!res.ok) throw new Error('Failed to fetch jobs');
          const data = await res.json();
          allJobs = data.value || data || [];
          updateStats();
          renderJobs();
        } catch (err) {
          console.error('Error fetching jobs:', err);
          document.getElementById('jobs-container').innerHTML = `
                    <div class="text-center py-16">
                        <div class="text-4xl mb-4">⚠️</div>
                        <p class="text-red-400 text-sm">Failed to load jobs</p>
                        <p class="text-slate-500 text-xs mt-2">${err.message}</p>
                    </div>
                `;
        }
      }

      function updateStats() {
        const total = allJobs.length;
        const pending = allJobs.filter((j) => j.status === 'Pending').length;
        const inProgress = allJobs.filter((j) => j.status === 'In Progress').length;
        const completed = allJobs.filter((j) => j.status === 'Completed').length;

        document.getElementById('total-jobs').textContent = total;
        document.getElementById('pending-jobs').textContent = pending;
        document.getElementById('in-progress-jobs').textContent = inProgress;
        document.getElementById('completed-jobs').textContent = completed;
      }

      function filterJobs(status) {
        currentFilter = status;

        document.querySelectorAll('.filter-btn').forEach((btn) => {
          btn.classList.remove('active');
          if (btn.dataset.filter === status) {
            btn.classList.add('active');
          }
        });

        renderJobs();
      }

      function renderJobs() {
        const container = document.getElementById('jobs-container');
        const emptyState = document.getElementById('empty-state');
        const searchTerm = document.getElementById('search-input').value.toLowerCase();

        let filteredJobs = allJobs;

        if (currentFilter !== 'all') {
          filteredJobs = filteredJobs.filter((j) => j.status === currentFilter);
        }

        if (searchTerm) {
          filteredJobs = filteredJobs.filter(
            (j) =>
              (j.id && j.id.toLowerCase().includes(searchTerm)) ||
              (j.company_name && j.company_name.toLowerCase().includes(searchTerm)) ||
              (j.tech_name && j.tech_name.toLowerCase().includes(searchTerm)) ||
              (j.service_type && j.service_type.toLowerCase().includes(searchTerm))
          );
        }

        if (filteredJobs.length === 0) {
          container.innerHTML = '';
          emptyState.classList.remove('hidden');
          return;
        }

        emptyState.classList.add('hidden');
        container.innerHTML = filteredJobs
          .map(
            (job, index) => `
                <div class="glass-panel p-5 rounded-xl fade-in" style="animation-delay: ${index * 0.05}s">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="text-xs font-mono text-slate-500">${job.id}</span>
                                <span class="status-${getStatusClass(job.status)} px-2 py-0.5 rounded text-[10px] font-bold uppercase">${job.status}</span>
                                <span class="text-[10px] font-bold uppercase tracking-wider text-slate-500 bg-white/5 px-2 py-0.5 rounded">${job.service_type}</span>
                            </div>
                            <h3 class="text-white font-bold text-sm mb-1">${job.company_name || 'Unknown Client'}</h3>
                            <p class="text-slate-400 text-xs line-clamp-2">${job.job_description || 'No description'}</p>
                        </div>
                        <div class="flex flex-col md:flex-row md:items-center gap-3 md:gap-6 text-xs">
                            <div class="flex items-center gap-2">
                                <span class="text-slate-500">👷</span>
                                <span class="text-slate-300">${job.tech_name || 'Unassigned'}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-slate-500">📍</span>
                                <span class="text-slate-300">${job.address || 'N/A'}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-slate-500">🕐</span>
                                <span class="text-slate-300">${formatDate(job.created_at)}</span>
                            </div>
                        </div>
                    </div>
                    ${
                      job.technician_notes
                        ? `
                        <div class="mt-3 pt-3 border-t border-white/5">
                            <p class="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Technician Notes</p>
                            <p class="text-xs text-slate-300">${job.technician_notes}</p>
                        </div>
                    `
                        : ''
                    }
                </div>
            `
          )
          .join('');
      }

      function getStatusClass(status) {
        switch (status) {
          case 'Pending':
            return 'pending';
          case 'In Progress':
            return 'in-progress';
          case 'Completed':
            return 'completed';
          case 'Cancelled':
            return 'cancelled';
          default:
            return 'pending';
        }
      }

      function formatDate(dateStr) {
        if (!dateStr) return 'N/A';
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', {
          month: 'short',
          day: 'numeric',
          year: 'numeric',
        });
      }

      document.getElementById('search-input').addEventListener('input', renderJobs);

      fetchJobs();
      setInterval(fetchJobs, 30000);

      // Scroll Reveal Animation
      function initScrollReveal() {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add('active');
              }
            });
          },
          { threshold: 0.1, rootMargin: '0px 0px -40px 0px' }
        );

        document.querySelectorAll('.glass-panel, section').forEach((el) => {
          el.classList.add('reveal');
          observer.observe(el);
        });
      }
      initScrollReveal();
    </script>

    <!-- Theme Toggle Script -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('am-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcons(savedTheme);
        function updateThemeIcons(theme) {
          const darkIcon = document.getElementById('theme-icon-dark');
          const lightIcon = document.getElementById('theme-icon-light');
          if (darkIcon && lightIcon) {
            if (theme === 'light') { darkIcon.classList.add('hidden'); lightIcon.classList.remove('hidden'); }
            else { darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden'); }
          }
        }
        window.toggleTheme = function() {
          const current = document.documentElement.getAttribute('data-theme');
          const next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('am-theme', next);
          updateThemeIcons(next);
        };
      })();
    </script>
  </body>
</html>
