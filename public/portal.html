<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Infrastructure Service Portal</title>
    <!-- Tailwind CSS -->
    <link href="./tailwind.css" rel="stylesheet" />
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- jsPDF Module -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
      /* Theme Variables */
      :root, [data-theme="dark"] {
        --bg-body: radial-gradient(ellipse at top right, rgba(99, 102, 241, 0.08), transparent 50%),
          radial-gradient(ellipse at bottom left, rgba(16, 185, 129, 0.06), transparent 45%), #09090b;
        --bg-surface: #0c0c10;
        --bg-card: linear-gradient(145deg, rgba(20, 20, 28, 0.75) 0%, rgba(12, 12, 18, 0.85) 100%);
        --bg-input: rgba(0, 0, 0, 0.45);
        --border-subtle: rgba(255, 255, 255, 0.06);
        --border-medium: rgba(255, 255, 255, 0.1);
        --border-strong: rgba(255, 255, 255, 0.15);
        --text-primary: #ffffff;
        --text-secondary: #e2e8f0;
        --text-muted: #94a3b8;
        --text-dim: #64748b;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      [data-theme="light"] {
        --bg-body: linear-gradient(145deg, #f0f0ff 0%, #e8f5e9 50%, #f5f5ff 100%);
        --bg-surface: #ffffff;
        --bg-card: linear-gradient(145deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 250, 252, 0.98) 100%);
        --bg-input: rgba(241, 245, 249, 0.9);
        --border-subtle: rgba(0, 0, 0, 0.06);
        --border-medium: rgba(0, 0, 0, 0.1);
        --border-strong: rgba(0, 0, 0, 0.15);
        --text-primary: #0f172a;
        --text-secondary: #1e293b;
        --text-muted: #475569;
        --text-dim: #94a3b8;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1);
      }
      /* Light mode overrides for hardcoded Tailwind classes */
      [data-theme="light"] .text-white { color: var(--text-primary) !important; }
      [data-theme="light"] .text-slate-200 { color: var(--text-secondary) !important; }
      [data-theme="light"] .text-slate-300 { color: var(--text-secondary) !important; }
      [data-theme="light"] .text-slate-400 { color: var(--text-muted) !important; }
      [data-theme="light"] .text-slate-500 { color: var(--text-dim) !important; }
      [data-theme="light"] .hover\:text-white:hover { color: var(--text-primary) !important; }
      [data-theme="light"] .bg-black\/20 { background: rgba(255, 255, 255, 0.6) !important; }
      [data-theme="light"] .bg-black\/30 { background: rgba(255, 255, 255, 0.8) !important; }
      [data-theme="light"] .bg-black\/40 { background: var(--bg-input) !important; }
      [data-theme="light"] .bg-white\/5 { background: rgba(0, 0, 0, 0.03) !important; }
      [data-theme="light"] .bg-white\/10 { background: rgba(0, 0, 0, 0.05) !important; }
      [data-theme="light"] .border-white\/5 { border-color: var(--border-subtle) !important; }
      [data-theme="light"] .border-white\/10 { border-color: var(--border-medium) !important; }
      [data-theme="light"] .border-white\/15 { border-color: var(--border-medium) !important; }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: var(--bg-body);
        background-attachment: fixed;
        color: var(--text-secondary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.5); }

      .glass-panel {
        background: var(--bg-card);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--border-subtle);
        box-shadow: var(--shadow-md);
      }
      .input-dark {
        background-color: var(--bg-input);
        border: 1px solid var(--border-medium);
        color: var(--text-primary);
        border-radius: 12px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .input-dark:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15), var(--shadow-sm);
      }
      /* Theme-aware inputs */
      input[type='text'], input[type='password'], input[type='number'], select, textarea {
        color: var(--text-primary) !important;
      }
      input::placeholder, textarea::placeholder {
        color: var(--text-dim) !important;
      }

      /* Smooth theme transition */
      body, .glass-panel, .input-dark, header, nav, footer, main, article, .filter-btn, table, tbody tr, th, td {
        transition: background-color 0.4s ease, background 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      }
    </style>
  </head>
  <body class="text-slate-200 min-h-screen p-6 md:p-12 flex flex-col items-center">
    <div class="max-w-4xl w-full space-y-8">
      <!-- Header -->
      <header
        class="border-b border-white/5 pb-6 flex flex-col md:flex-row md:justify-between md:items-center gap-4"
      >
        <div>
          <div class="flex items-center gap-2 mb-1">
            <span class="h-2 w-2 rounded-full bg-indigo-500 animate-pulse"></span>
            <span class="text-xs font-semibold tracking-widest text-indigo-400 uppercase"
              >Secure Client Console</span
            >
          </div>
          <h1
            class="text-3xl font-extrabold tracking-tight text-white sm:text-4xl bg-gradient-to-r from-white via-slate-200 to-indigo-400 bg-clip-text text-transparent"
          >
            CLIENT MAINTENANCE PORTAL
          </h1>
          <p class="text-sm text-slate-400 mt-1 font-medium">
            Verify historical system deployments, WiFi audits, and CCTV state parameters
          </p>
        </div>
        <div class="flex gap-2 items-center">
          <button id="theme-toggle" onclick="toggleTheme()" class="flex items-center gap-2 px-3 py-2 rounded-xl transition-all bg-indigo-500/10 border border-indigo-500/30 hover:bg-indigo-500/20 text-indigo-400" title="Toggle Dark/Light Mode" aria-label="Toggle theme">
            <svg id="theme-icon-dark" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
            <svg id="theme-icon-light" class="w-4 h-4 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            <span class="text-[10px] font-bold uppercase tracking-wider">Theme</span>
          </button>
          <input
            name="client-id-input"
            type="text"
            id="client-id-input"
            placeholder="Client Account ID (e.g., CLI-101)"
            class="bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono tracking-wide w-full md:w-64 placeholder-slate-600"
          />
          <button
            onclick="loadClientHistory()"
            class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-bold px-6 py-3 rounded-xl transition-all hover:scale-[1.02] whitespace-nowrap shadow-lg hover:shadow-indigo-500/20"
          >
            Pull Logs
          </button>
        </div>
      </header>

      <!-- Dynamic Logs Feed Container -->
      <main id="portal-feed" class="space-y-6">
        <div id="portal-summary-container"></div>
        <div id="portal-logs-container" class="space-y-6">
          <div
            class="glass-panel text-center py-16 text-slate-500 rounded-3xl border border-white/5 shadow-2xl"
          >
            <span class="text-4xl block mb-3">🔍</span>
            <p class="text-sm font-medium">
              Enter your Client Key Identifier code above to request operational field records.
            </p>
          </div>
        </div>
      </main>

      <!-- Pagination Controls -->
      <div id="feed-pagination" class="flex justify-between items-center text-xs pt-4 hidden">
        <button
          type="button"
          onclick="changeFeedPage(-1)"
          class="bg-white/5 border border-white/10 text-slate-300 font-bold px-4 py-2 rounded-xl hover:bg-white/15 disabled:opacity-40 transition-all"
          id="btn-feed-prev"
        >
          Prev
        </button>
        <span class="text-slate-400 font-mono font-bold" id="feed-page-indicator">Page 1 of 1</span>
        <button
          type="button"
          onclick="changeFeedPage(1)"
          class="bg-white/5 border border-white/10 text-slate-300 font-bold px-4 py-2 rounded-xl hover:bg-white/15 disabled:opacity-40 transition-all"
          id="btn-feed-next"
        >
          Next
        </button>
      </div>
    </div>

    <script>
      const API_BASE_URL = window.location.origin;

      function escapeHTML(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
      }

      function safeNum(val, decimals = 5) {
        return (val != null && !isNaN(val)) ? Number(val).toFixed(decimals) : 'N/A';
      }

      let activeFeedLogs = [];
      let feedPage = 1;
      const feedPerPage = 4;
      let activeClientId = '';

      async function loadClientHistory() {
        const clientId = document.getElementById('client-id-input').value.trim();
        const summaryContainer = document.getElementById('portal-summary-container');
        const logsContainer = document.getElementById('portal-logs-container');

        if (!clientId) return alert('Please supply a valid account parameter identifier.');

        activeClientId = clientId;
        logsContainer.innerHTML =
          '<div class="text-center py-16 text-indigo-400 animate-pulse font-mono tracking-widest text-xs uppercase font-bold">Querying global infrastructure matrix nodes...</div>';
        summaryContainer.innerHTML = '';
        document.getElementById('feed-pagination').classList.add('hidden');

        try {
          const res = await fetch(`${API_BASE_URL}/api/portal/history?client_id=${clientId}`);
          if (!res.ok) throw new Error('Could not acquire profile matrix logs.');
          activeFeedLogs = await res.json();

          if (activeFeedLogs.length === 0) {
            logsContainer.innerHTML = `
                        <div class="glass-panel text-center py-16 text-slate-500 rounded-3xl border border-white/5 shadow-2xl">
                            <span class="text-3xl block mb-2">📁</span>
                            No validated, completed infrastructure logs are associated with account identifier: <b class="font-mono text-slate-300 font-bold">${clientId}</b>
                        </div>`;
            return;
          }

          // Also fetch client warranties and AMC info
          const warrantyRes = await fetch(
            `${API_BASE_URL}/api/portal/warranties?client_id=${clientId}`
          );
          const warranties = warrantyRes.ok ? await warrantyRes.json() : [];

          // Create AMC and Warranty Summary Panels
          const summaryBlock = document.createElement('div');
          summaryBlock.className = 'grid md:grid-cols-3 gap-6 mb-6';

          // Resolve Client info from first log record
          const clientName = activeFeedLogs[0].company_name || clientId;
          const amcStart = activeFeedLogs[0].amc_start || 'N/A';
          const amcEnd = activeFeedLogs[0].amc_end || 'N/A';
          const amcStatus = activeFeedLogs[0].amc_status || 'Inactive';
          const amcBadgeColor =
            amcStatus === 'Active'
              ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'
              : amcStatus === 'Expired'
                ? 'bg-rose-500/10 text-rose-400 border-rose-500/20'
                : 'bg-slate-500/10 text-slate-400 border-slate-500/20';

          summaryBlock.innerHTML = `
                    <!-- AMC Contract Status Panel -->
                    <div class="glass-panel p-5 rounded-3xl shadow-xl border border-white/5 space-y-3 md:col-span-1 flex flex-col justify-between">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Annual Maintenance</span>
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-full border uppercase ${amcBadgeColor}">${amcStatus}</span>
                        </div>
                        <h4 class="text-sm font-bold text-white">${clientName}</h4>
                        <div class="text-xs text-slate-400 space-y-1 font-mono">
                            <div>Start: ${amcStart}</div>
                            <div>Expiry: ${amcEnd}</div>
                        </div>
                    </div>

                    <!-- Warranty & Serial Trackers -->
                    <div class="glass-panel p-5 rounded-3xl shadow-xl border border-white/5 space-y-3 md:col-span-2">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">Active Hardware Warranties</span>
                        <div class="max-h-[120px] overflow-y-auto scrollbar-thin space-y-2 pr-1">
                            ${
                              warranties.length === 0
                                ? '<div class="text-xs text-slate-500 italic py-4">No serialized active warranties registered.</div>'
                                : warranties
                                    .map((w) => {
                                      const installDate = new Date(w.installed_date || Date.now());
                                      const expiryDate = new Date(installDate);
                                      expiryDate.setMonth(
                                        expiryDate.getMonth() + (w.warranty_months || 12)
                                      );
                                      const diffDays = Math.ceil(
                                        (expiryDate - new Date()) / (1000 * 60 * 60 * 24)
                                      );
                                      const warrantyRemaining =
                                        diffDays > 0 ? `${diffDays} days left` : 'Expired';
                                      const remainingColor =
                                        diffDays > 30
                                          ? 'text-emerald-400'
                                          : diffDays > 0
                                            ? 'text-amber-400'
                                            : 'text-rose-400';

                                      return `
                                    <div class="flex justify-between items-center text-xs bg-black/40 p-2.5 rounded-lg border border-white/5">
                                        <div>
                                            <span class="text-white font-bold block">${escapeHTML(w.device_name)}</span>
                                            <span class="text-[9px] text-slate-400 font-mono">S/N: ${escapeHTML(w.serial_number)}</span>
                                        </div>
                                        <div class="text-right font-mono">
                                            <span class="block text-[9px] text-slate-500">Exp: ${expiryDate.toLocaleDateString()}</span>
                                            <span class="text-[10px] font-bold ${remainingColor}">${warrantyRemaining}</span>
                                        </div>
                                    </div>
                                `;
                                    })
                                    .join('')
                            }
                        </div>
                    </div>

                    <!-- Billing & Invoices Statements -->
                    <div class="glass-panel p-5 rounded-3xl shadow-xl border border-white/5 space-y-3 md:col-span-3">
                        <div class="flex justify-between items-center border-b border-white/5 pb-2">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest font-extrabold text-indigo-300">Client Invoicing & Payment History Ledger</span>
                            <button onclick="downloadBillingStatementPDF('${clientId}')" class="text-[10px] font-bold text-indigo-400 hover:underline">Download Statement PDF</button>
                        </div>
                        <div class="max-h-[140px] overflow-y-auto scrollbar-thin space-y-2 pr-1 pt-1" id="portal-billing-list">
                            <div class="text-xs text-slate-500 italic py-4 text-center">Loading payments...</div>
                        </div>
                    </div>
                `;

          summaryContainer.appendChild(summaryBlock);

          // Fetch client billing transactions dynamically
          try {
            const txRes = await fetch(
              `${API_BASE_URL}/api/portal/transactions?client_id=${clientId}`
            );
            const txs = txRes.ok ? await txRes.json() : [];
            const txList = document.getElementById('portal-billing-list');
            if (txs.length === 0) {
              txList.innerHTML =
                '<div class="text-xs text-slate-500 italic py-4 text-center">No invoice or payment statement ledger logs found.</div>';
            } else {
              txList.innerHTML = '';
              txs.forEach((t) => {
                const amountPrefix = t.transaction_type === 'Deposit' ? '+' : '-';
                const badgeColor =
                  t.transaction_type === 'Deposit'
                    ? 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20'
                    : 'text-rose-400 bg-rose-500/10 border-rose-500/20';
                txList.innerHTML += `
                                <div class="flex justify-between items-center text-xs bg-black/40 p-2.5 rounded-lg border border-white/5 font-mono">
                                    <div>
                                        <span class="px-2 py-0.5 rounded-full font-bold text-[9px] border ${badgeColor} mr-2">${t.transaction_type}</span>
                                        <span class="text-slate-300 font-bold">${escapeHTML(t.notes)}</span>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-white block font-bold">${amountPrefix}${t.primary_currency === 'USD' ? '$' : ''}${t.amount.toLocaleString()} ${t.primary_currency === 'MMK' ? 'Ks' : ''}</span>
                                        <span class="text-[9px] text-slate-500">Rate: ${t.exchange_rate} (${t.equivalent_amount.toLocaleString()} Ks)</span>
                                    </div>
                                </div>
                            `;
              });
            }
          } catch (e) { console.error('Error:', e); }

          feedPage = 1;
          renderFeed();
        } catch (err) {
          logsContainer.innerHTML = `<div class="text-center py-12 text-rose-400 bg-rose-950/10 border border-rose-500/20 rounded-2xl font-mono text-sm">Error matching query parameter credentials: ${err.message}</div>`;
        }
      }

      function changeFeedPage(delta) {
        feedPage += delta;
        renderFeed();
      }

      function renderFeed() {
        const logsContainer = document.getElementById('portal-logs-container');
        const totalPages = Math.ceil(activeFeedLogs.length / feedPerPage) || 1;

        if (feedPage < 1) feedPage = 1;
        if (feedPage > totalPages) feedPage = totalPages;

        document.getElementById('feed-page-indicator').textContent =
          `Page ${feedPage} of ${totalPages}`;
        document.getElementById('btn-feed-prev').disabled = feedPage === 1;
        document.getElementById('btn-feed-next').disabled = feedPage === totalPages;
        document.getElementById('feed-pagination').classList.remove('hidden');

        const start = (feedPage - 1) * feedPerPage;
        const end = start + feedPerPage;
        const sliced = activeFeedLogs.slice(start, end);

        logsContainer.innerHTML = '';
        sliced.forEach((log) => {
          const block = document.createElement('article');
          block.className = 'glass-panel p-6 rounded-3xl shadow-xl space-y-5';

          let equipmentList = [];
          try {
            equipmentList = JSON.parse(log.equipment_used || '[]');
          } catch (e) { console.error('Error:', e); }

          block.innerHTML = `
                    <div class="flex justify-between items-start border-b border-white/5 pb-3">
                        <div>
                            <span class="bg-indigo-500/10 text-indigo-400 text-xs font-bold font-mono px-3 py-1 rounded border border-indigo-500/20">${log.service_type}</span>
                            <h3 class="text-lg font-bold text-white mt-2">Work Order Record: ${log.id}</h3>
                        </div>
                        <span class="text-[10px] font-mono text-slate-400 bg-black/40 px-3 py-1.5 rounded-lg border border-white/5">Closed: ${log.updated_at}</span>
                    </div>

                    <!-- Telemetry Block -->
                    <div class="grid grid-cols-2 gap-4 text-xs bg-black/20 p-3 rounded-xl border border-white/5 font-mono text-slate-400">
                        <div>
                            <span class="font-bold text-slate-300 block mb-0.5">⏱️ Arrival</span>
                            ${log.arrival_time ? `${escapeHTML(log.arrival_time)}${log.arrival_lat != null && log.arrival_lng != null ? `<br><a href="https://www.google.com/maps?q=${log.arrival_lat},${log.arrival_lng}" target="_blank" class="text-indigo-400 hover:underline">GPS: ${safeNum(log.arrival_lat)}, ${safeNum(log.arrival_lng)}</a>` : ''}` : 'Not recorded'}
                        </div>
                        <div>
                            <span class="font-bold text-slate-300 block mb-0.5">⏱️ Completion</span>
                            ${log.completion_time ? `${escapeHTML(log.completion_time)}${log.completion_lat != null && log.completion_lng != null ? `<br><a href="https://www.google.com/maps?q=${log.completion_lat},${log.completion_lng}" target="_blank" class="text-indigo-400 hover:underline">GPS: ${safeNum(log.completion_lat)}, ${safeNum(log.completion_lng)}</a>` : ''}` : 'Not recorded'}
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-5 text-sm">
                        <div class="space-y-1">
                            <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Target Statement of Scope</h4>
                            <p class="text-slate-300 bg-black/30 p-4 rounded-xl border border-white/5 leading-relaxed">${escapeHTML(log.job_description)}</p>
                        </div>
                        <div class="space-y-1">
                            <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Engineer Resolutions & Signoff Notes</h4>
                            <p class="text-emerald-400 bg-emerald-950/10 p-4 rounded-xl border border-emerald-500/20 leading-relaxed">${escapeHTML(log.technician_notes || 'No closing addenda documented.')}</p>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Hardware Infrastructure Implemented</h4>
                        <div class="flex flex-wrap gap-2">
                            ${equipmentList.length > 0 ? equipmentList.map((e) => `<span class="bg-black/40 border border-white/10 text-xs px-3 py-1.5 rounded-lg text-slate-300 font-mono">${e}</span>`).join('') : '<span class="text-xs text-slate-500 italic">No inventory deployment required during execution loop.</span>'}
                        </div>
                    </div>
                    ${
                      log.before_photo || log.after_photo
                        ? `
                    <div class="space-y-2 pt-2 border-t border-white/5">
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Visual Inspection Syncs</h4>
                        <div class="grid grid-cols-2 gap-4">
                            ${
                              log.before_photo
                                ? `
                            <div class="space-y-1">
                                <span class="text-[10px] text-slate-500 block font-semibold">BEFORE</span>
                                <img src="${log.before_photo}" class="rounded-xl border border-white/10 max-h-48 object-cover shadow-lg w-full" alt="Before Deployment">
                            </div>`
                                : ''
                            }
                            ${
                              log.after_photo
                                ? `
                            <div class="space-y-1">
                                <span class="text-[10px] text-slate-500 block font-semibold">AFTER</span>
                                <img src="${log.after_photo}" class="rounded-xl border border-white/10 max-h-48 object-cover shadow-lg w-full" alt="After Deployment">
                            </div>`
                                : ''
                            }
                        </div>
                    </div>`
                        : ''
                    }

                    <!-- Customer Signature Sign-Off -->
                    ${
                      log.signature
                        ? `
                    <div class="space-y-1 pt-3 border-t border-white/5">
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Customer Validation Signature</h4>
                        <div class="bg-white/10 rounded-xl border border-white/15 inline-block p-2">
                            <img src="${log.signature}" class="max-h-16 invert opacity-80" alt="Customer Signature">
                        </div>
                    </div>`
                        : ''
                    }
                `;
          logsContainer.appendChild(block);
        });
      }

      async function downloadBillingStatementPDF(clientId) {
        try {
          const txRes = await fetch(
            `${API_BASE_URL}/api/portal/transactions?client_id=${clientId}`
          );
          const txs = txRes.ok ? await txRes.json() : [];
          if (txs.length === 0) return alert('No billing history found to compile.');

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF('p', 'mm', 'a4');

          doc.setFillColor(79, 70, 229);
          doc.rect(0, 0, 210, 8, 'F');

          doc.setTextColor(15, 23, 42);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(20);
          doc.text('CLIENT BILLING STATEMENT', 15, 25);

          doc.setTextColor(100, 116, 139);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(9);
          doc.text('STATEMENT OF ACCOUNTS & TRANSACTIONS LOG', 15, 30);

          doc.setDrawColor(226, 232, 240);
          doc.setLineWidth(0.5);
          doc.line(15, 35, 195, 35);

          let currentY = 48;
          doc.setTextColor(15, 23, 42);
          doc.setFontSize(10);
          doc.setFont('helvetica', 'bold');
          doc.text('TRANSACTION LEDGER HISTORY:', 15, currentY);
          currentY += 8;

          txs.forEach((t, i) => {
            if (currentY > 270) {
              doc.addPage();
              currentY = 20;
            }
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(9);
            const amountStr = `${t.transaction_type}: ${t.primary_currency === 'USD' ? '$' : ''}${t.amount.toLocaleString()} ${t.primary_currency === 'MMK' ? 'Ks' : ''} (Rate: ${t.exchange_rate} / Equiv: ${t.equivalent_amount.toLocaleString()} Ks)`;
            doc.text(
              `${i + 1}. [${new Date(t.created_at).toLocaleDateString()}] ${t.notes}`,
              15,
              currentY
            );
            doc.text(amountStr, 15, currentY + 5);
            currentY += 13;
          });

          doc.save(`billing-statement-${clientId}.pdf`);
        } catch (e) {
          alert('Error compiling PDF: ' + e.message);
        }
      }
    </script>

    <!-- Theme Toggle Script -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('am-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcons(savedTheme);
        function updateThemeIcons(theme) {
          const darkIcon = document.getElementById('theme-icon-dark');
          const lightIcon = document.getElementById('theme-icon-light');
          if (darkIcon && lightIcon) {
            if (theme === 'light') { darkIcon.classList.add('hidden'); lightIcon.classList.remove('hidden'); }
            else { darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden'); }
          }
        }
        window.toggleTheme = function() {
          const current = document.documentElement.getAttribute('data-theme');
          const next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('am-theme', next);
          updateThemeIcons(next);
        };
      })();
    </script>
  </body>
</html>
