<div id="view-attendance" class="space-y-6 tab-view">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h2 class="text-xl font-bold text-white">Attendance</h2>
      <p class="text-slate-400 text-sm">Track technician clock-in/out records</p>
    </div>
    <div class="flex gap-2">
      <input type="date" id="att-date-from" class="bg-zinc-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white" />
      <input type="date" id="att-date-to" class="bg-zinc-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white" />
      <button onclick="loadAttendance()" class="bg-amber-500 hover:bg-amber-600 text-black font-semibold px-4 py-2 rounded-lg text-sm transition">Filter</button>
    </div>
  </div>

  <!-- Stats Cards -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-zinc-900 border border-white/5 rounded-xl p-4">
      <p class="text-slate-400 text-xs font-semibold uppercase">Currently Clocked In</p>
      <p id="att-online-count" class="text-2xl font-bold text-emerald-400 mt-1">0</p>
    </div>
    <div class="bg-zinc-900 border border-white/5 rounded-xl p-4">
      <p class="text-slate-400 text-xs font-semibold uppercase">Total Records</p>
      <p id="att-total-count" class="text-2xl font-bold text-white mt-1">0</p>
    </div>
    <div class="bg-zinc-900 border border-white/5 rounded-xl p-4">
      <p class="text-slate-400 text-xs font-semibold uppercase">Today's Check-ins</p>
      <p id="att-today-count" class="text-2xl font-bold text-blue-400 mt-1">0</p>
    </div>
    <div class="bg-zinc-900 border border-white/5 rounded-xl p-4">
      <p class="text-slate-400 text-xs font-semibold uppercase">Avg Duration</p>
      <p id="att-avg-duration" class="text-2xl font-bold text-purple-400 mt-1">--</p>
    </div>
  </div>

  <!-- Currently Online -->
  <div class="bg-zinc-900 border border-white/5 rounded-xl p-5">
    <h3 class="text-sm font-bold text-white mb-3 flex items-center gap-2">
      <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
      Currently Online
    </h3>
    <div id="att-online-list" class="space-y-2">
      <p class="text-slate-500 text-sm">No one is currently clocked in.</p>
    </div>
  </div>

  <!-- Attendance Table -->
  <div class="bg-zinc-900 border border-white/5 rounded-xl overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-white/5 text-slate-400 text-xs uppercase">
            <th class="text-left px-4 py-3 font-semibold">Technician</th>
            <th class="text-left px-4 py-3 font-semibold">Date</th>
            <th class="text-left px-4 py-3 font-semibold">Clock In</th>
            <th class="text-left px-4 py-3 font-semibold">Clock Out</th>
            <th class="text-left px-4 py-3 font-semibold">Duration</th>
            <th class="text-left px-4 py-3 font-semibold">Status</th>
          </tr>
        </thead>
        <tbody id="att-table-body" class="divide-y divide-white/5">
          <tr>
            <td colspan="6" class="px-4 py-8 text-center text-slate-500">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  async function loadAttendance() {
    const dateFrom = document.getElementById('att-date-from').value;
    const dateTo = document.getElementById('att-date-to').value;

    let url = '/api/attendance';
    const params = new URLSearchParams();
    if (dateFrom) params.set('date_from', dateFrom);
    if (dateTo) params.set('date_to', dateTo);
    if (params.toString()) url += '?' + params.toString();

    try {
      const token = localStorage.getItem('admin_token');
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      const records = data.data || data || [];

      // Stats
      const today = new Date().toISOString().slice(0, 10);
      const online = records.filter(r => r.date === today && r.clock_in && !r.clock_out);
      const todayCheckins = records.filter(r => r.date === today);
      const completed = records.filter(r => r.clock_in && r.clock_out);

      document.getElementById('att-online-count').textContent = online.length;
      document.getElementById('att-total-count').textContent = records.length;
      document.getElementById('att-today-count').textContent = todayCheckins.length;

      if (completed.length > 0) {
        const totalMins = completed.reduce((sum, r) => {
          return sum + (new Date(r.clock_out).getTime() - new Date(r.clock_in).getTime()) / 60000;
        }, 0);
        const avg = Math.round(totalMins / completed.length);
        document.getElementById('att-avg-duration').textContent = `${Math.floor(avg / 60)}h ${avg % 60}m`;
      }

      // Online list
      const onlineList = document.getElementById('att-online-list');
      if (online.length === 0) {
        onlineList.innerHTML = '<p class="text-slate-500 text-sm">No one is currently clocked in.</p>';
      } else {
        onlineList.innerHTML = online.map(r => {
          const ci = new Date(r.clock_in).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
          return `<div class="flex items-center justify-between bg-emerald-500/10 rounded-lg px-3 py-2">
            <span class="text-white text-sm font-medium">${r.technician_name || r.technician_id}</span>
            <span class="text-emerald-400 text-xs">since ${ci}</span>
          </div>`;
        }).join('');
      }

      // Table
      const tbody = document.getElementById('att-table-body');
      if (records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-slate-500">No records found</td></tr>';
        return;
      }

      tbody.innerHTML = records.map(r => {
        const ci = r.clock_in ? new Date(r.clock_in).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '--';
        const co = r.clock_out ? new Date(r.clock_out).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) : '--';
        let dur = '--';
        if (r.clock_in && r.clock_out) {
          const mins = Math.round((new Date(r.clock_out).getTime() - new Date(r.clock_in).getTime()) / 60000);
          dur = `${Math.floor(mins / 60)}h ${mins % 60}m`;
        }
        const status = r.clock_in && !r.clock_out
          ? '<span class="text-emerald-400 font-semibold">Online</span>'
          : r.clock_in && r.clock_out
            ? '<span class="text-slate-400">Completed</span>'
            : '<span class="text-slate-500">--</span>';

        return `<tr class="hover:bg-white/5 transition">
          <td class="px-4 py-3 text-white font-medium">${r.technician_name || r.technician_id}</td>
          <td class="px-4 py-3 text-slate-300">${r.date}</td>
          <td class="px-4 py-3 text-slate-300">${ci}</td>
          <td class="px-4 py-3 text-slate-300">${co}</td>
          <td class="px-4 py-3 text-slate-300">${dur}</td>
          <td class="px-4 py-3">${status}</td>
        </tr>`;
      }).join('');
    } catch (err) {
      console.error('Failed to load attendance:', err);
    }
  }

  // Make loadAttendance available globally for switchTab to call
  window.loadAttendance = loadAttendance;
</script>
