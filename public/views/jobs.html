<div id="view-jobs" class="tab-view hidden space-y-6">
  <!-- Stats Cards -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="glass-panel p-4 rounded-xl text-center">
      <p class="text-2xl font-black text-white" id="total-jobs">0</p>
      <p class="text-xs text-slate-400 uppercase tracking-wider">Total Jobs</p>
    </div>
    <div class="glass-panel p-4 rounded-xl text-center">
      <p class="text-2xl font-black text-yellow-400" id="pending-jobs">0</p>
      <p class="text-xs text-slate-400 uppercase tracking-wider">Pending</p>
    </div>
    <div class="glass-panel p-4 rounded-xl text-center">
      <p class="text-2xl font-black text-blue-400" id="in-progress-jobs">0</p>
      <p class="text-xs text-slate-400 uppercase tracking-wider">In Progress</p>
    </div>
    <div class="glass-panel p-4 rounded-xl text-center">
      <p class="text-2xl font-black text-green-400" id="completed-jobs">0</p>
      <p class="text-xs text-slate-400 uppercase tracking-wider">Completed</p>
    </div>
  </div>

  <!-- Filters & Search -->
  <div class="flex flex-col md:flex-row gap-4 items-stretch md:items-center justify-between">
    <div class="flex flex-wrap gap-2">
      <button
        onclick="filterJobsList('all')"
        class="filter-job-btn active px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 transition"
        data-filter="all"
      >
        All
      </button>
      <button
        onclick="filterJobsList('Pending')"
        class="filter-job-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition"
        data-filter="Pending"
      >
        Pending
      </button>
      <button
        onclick="filterJobsList('In Progress')"
        class="filter-job-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition"
        data-filter="In Progress"
      >
        In Progress
      </button>
      <button
        onclick="filterJobsList('Completed')"
        class="filter-job-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition"
        data-filter="Completed"
      >
        Completed
      </button>
      <button
        onclick="filterJobsList('Cancelled')"
        class="filter-job-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition"
        data-filter="Cancelled"
      >
        Cancelled
      </button>
    </div>
    <div class="flex-1 max-w-md">
      <input
        name="job-search-input"
        type="text"
        id="job-search-input"
        placeholder="Search by Job ID, Client, or Technician..."
        class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-xs text-white placeholder:text-slate-500 focus:outline-none focus:border-amber-500 transition"
      />
    </div>
  </div>

  <!-- Jobs List Container -->
  <div id="jobs-list-container" class="space-y-4">
    <div class="text-center py-16">
      <div class="animate-pulse text-amber-500 font-bold uppercase text-xs tracking-widest">
        Loading jobs...
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div id="jobs-empty-state" class="hidden text-center py-16">
    <div class="text-4xl mb-4">📋</div>
    <p class="text-slate-400 text-sm">No jobs found</p>
  </div>
</div>

<script>
  let listJobs = [];
  let listJobsFilter = 'all';

  async function loadJobsDashboardData() {
    const baseUrl = document.getElementById('api-base').value;
    const container = document.getElementById('jobs-list-container');
    try {
      const res = await fetch(`${baseUrl}/api/jobs`);
      if (!res.ok) throw new Error('Failed to fetch jobs');
      const data = await res.json();
      listJobs = data.value || data || [];
      updateJobsDashboardStats();
      renderJobsDashboardList();
    } catch (err) {
      console.error('Error fetching jobs:', err);
      container.innerHTML = `
                <div class="text-center py-16 border border-rose-500/20 bg-rose-500/5 rounded-xl">
                    <div class="text-2xl mb-2">⚠️</div>
                    <p class="text-rose-400 text-xs font-bold">Failed to load jobs list</p>
                    <p class="text-slate-500 text-[10px] mt-1">${err.message}</p>
                </div>
            `;
    }
  }

  function updateJobsDashboardStats() {
    const total = listJobs.length;
    const pending = listJobs.filter((j) => j.status === 'Pending').length;
    const inProgress = listJobs.filter((j) => j.status === 'In Progress').length;
    const completed = listJobs.filter((j) => j.status === 'Completed').length;

    if (document.getElementById('total-jobs'))
      document.getElementById('total-jobs').textContent = total;
    if (document.getElementById('pending-jobs'))
      document.getElementById('pending-jobs').textContent = pending;
    if (document.getElementById('in-progress-jobs'))
      document.getElementById('in-progress-jobs').textContent = inProgress;
    if (document.getElementById('completed-jobs'))
      document.getElementById('completed-jobs').textContent = completed;
  }

  function filterJobsList(status) {
    listJobsFilter = status;
    document.querySelectorAll('.filter-job-btn').forEach((btn) => {
      btn.classList.remove('active');
      if (btn.dataset.filter === status) {
        btn.classList.add('active');
      }
    });
    renderJobsDashboardList();
  }

  function renderJobsDashboardList() {
    const container = document.getElementById('jobs-list-container');
    const emptyState = document.getElementById('jobs-empty-state');
    const searchInput = document.getElementById('job-search-input');
    const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';

    let filtered = listJobs;

    if (listJobsFilter !== 'all') {
      filtered = filtered.filter((j) => j.status === listJobsFilter);
    }

    if (searchTerm) {
      filtered = filtered.filter(
        (j) =>
          (j.id && j.id.toLowerCase().includes(searchTerm)) ||
          (j.company_name && j.company_name.toLowerCase().includes(searchTerm)) ||
          (j.tech_name && j.tech_name.toLowerCase().includes(searchTerm)) ||
          (j.service_type && j.service_type.toLowerCase().includes(searchTerm))
      );
    }

    if (filtered.length === 0) {
      container.innerHTML = '';
      emptyState.classList.remove('hidden');
      return;
    }

    emptyState.classList.add('hidden');
    container.innerHTML = filtered
      .map((job, index) => {
        let statusClass = 'pending';
        if (job.status === 'In Progress') statusClass = 'in-progress';
        else if (job.status === 'Completed') statusClass = 'completed';
        else if (job.status === 'Cancelled') statusClass = 'cancelled';

        return `
            <div class="glass-panel p-5 rounded-xl fade-in" style="animation-delay: ${index * 0.05}s">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-xs font-mono text-slate-500">${job.id}</span>
                            <span class="status-${statusClass} px-2 py-0.5 rounded text-[10px] font-bold uppercase">${job.status}</span>
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-500 bg-white/5 px-2 py-0.5 rounded">${job.service_type}</span>
                        </div>
                        <h3 class="text-white font-bold text-sm mb-1">${job.company_name || 'Unknown Client'}</h3>
                        <p class="text-slate-400 text-xs line-clamp-2">${job.job_description || 'No description'}</p>
                    </div>
                    <div class="flex flex-col md:flex-row md:items-center gap-3 md:gap-6 text-xs">
                        <div class="flex items-center gap-2">
                            <span class="text-slate-500">👷</span>
                            <span class="text-slate-300">${job.tech_name || 'Unassigned'}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-slate-500">📍</span>
                            <span class="text-slate-300">${job.address || 'N/A'}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-slate-500">🕐</span>
                            <span class="text-slate-300">${formatJobDate(job.created_at)}</span>
                        </div>
                    </div>
                </div>
                ${
                  job.technician_notes
                    ? `
                    <div class="mt-3 pt-3 border-t border-white/5">
                        <p class="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Technician Notes</p>
                        <p class="text-xs text-slate-300">${job.technician_notes}</p>
                    </div>
                `
                    : ''
                }
            </div>
            `;
      })
      .join('');
  }

  function formatJobDate(dateStr) {
    if (!dateStr) return 'N/A';
    const date = new Date(dateStr);
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // Attach search event listener
  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('job-search-input');
    if (input) input.addEventListener('input', renderJobsDashboardList);
  });
</script>
