            </div>

    <!-- Contact Info -->

        </h3>

            <div class="space-y-1">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Address</label>
                <input name="lp-address" type="text" id="lp-address" class="w-full bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-xs text-white" placeholder="No. 123, Security Road, Yangon">
            </div>

                <input name="lp-phone" type="text" id="lp-phone" class="w-full bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-xs text-white" placeholder="+95 9 443 882 991">

    <div id="lp-status" class="hidden text-center py-3 rounded-lg text-sm font-semibold"></div>

<script>
// Load landing page content on view load
function loadLandingPageContent() {
    const baseUrl = document.getElementById('api-base').value;
    
    fetch(`${baseUrl}/api/landing-page`)
        .then(res => res.json())
        .then(data => {
            if (data.value) {
                const content = data.value;
                // Hero
                document.getElementById('lp-eyebrow').value = content.eyebrow || '';
                document.getElementById('lp-headline').value = content.headline || '';
                document.getElementById('lp-description').value = content.description || '';
                document.getElementById('lp-btn-primary').value = content.btn_primary || '';
                document.getElementById('lp-btn-secondary').value = content.btn_secondary || '';
                
                // Stats
                document.getElementById('lp-stat1-value').value = content.stat1_value || '';
                document.getElementById('lp-stat1-label').value = content.stat1_label || '';
                document.getElementById('lp-stat2-value').value = content.stat2_value || '';
                document.getElementById('lp-stat2-label').value = content.stat2_label || '';
                document.getElementById('lp-stat3-value').value = content.stat3_value || '';
                document.getElementById('lp-stat3-label').value = content.stat3_label || '';
                document.getElementById('lp-stat4-value').value = content.stat4_value || '';
                document.getElementById('lp-stat4-label').value = content.stat4_label || '';
                
                // Services
                document.getElementById('lp-services-title').value = content.services_title || '';
                document.getElementById('lp-service1-title').value = content.service1_title || '';
                document.getElementById('lp-service1-desc').value = content.service1_desc || '';
                document.getElementById('lp-service2-title').value = content.service2_title || '';
                document.getElementById('lp-service2-desc').value = content.service2_desc || '';
                document.getElementById('lp-service3-title').value = content.service3_title || '';
                document.getElementById('lp-service3-desc').value = content.service3_desc || '';
                
                // Contact
                document.getElementById('lp-address').value = content.address || '';
                document.getElementById('lp-phone').value = content.phone || '';
                document.getElementById('lp-email').value = content.email || '';
                document.getElementById('lp-hours').value = content.hours || '';
                document.getElementById('lp-map-lat').value = content.map_lat || '';
                document.getElementById('lp-map-lng').value = content.map_lng || '';
                
                // Footer
                document.getElementById('lp-copyright').value = content.copyright || '';
            }
        })
        .catch(err => console.error('Failed to load landing page content:', err));
}

// Save landing page content
function saveLandingPage() {
    const baseUrl = document.getElementById('api-base').value;
    const statusEl = document.getElementById('lp-status');
    
    const content = {
        // Hero
        eyebrow: document.getElementById('lp-eyebrow').value,
        headline: document.getElementById('lp-headline').value,
        description: document.getElementById('lp-description').value,
        btn_primary: document.getElementById('lp-btn-primary').value,
        btn_secondary: document.getElementById('lp-btn-secondary').value,
        
        // Stats
        stat1_value: document.getElementById('lp-stat1-value').value,
        stat1_label: document.getElementById('lp-stat1-label').value,
        stat2_value: document.getElementById('lp-stat2-value').value,
        stat2_label: document.getElementById('lp-stat2-label').value,
        stat3_value: document.getElementById('lp-stat3-value').value,
        stat3_label: document.getElementById('lp-stat3-label').value,
        stat4_value: document.getElementById('lp-stat4-value').value,
        stat4_label: document.getElementById('lp-stat4-label').value,
        
        // Services
        services_title: document.getElementById('lp-services-title').value,
        service1_title: document.getElementById('lp-service1-title').value,
        service1_desc: document.getElementById('lp-service1-desc').value,
        service2_title: document.getElementById('lp-service2-title').value,
        service2_desc: document.getElementById('lp-service2-desc').value,
        service3_title: document.getElementById('lp-service3-title').value,
        service3_desc: document.getElementById('lp-service3-desc').value,
        
        // Contact
        address: document.getElementById('lp-address').value,
        phone: document.getElementById('lp-phone').value,
        email: document.getElementById('lp-email').value,
        hours: document.getElementById('lp-hours').value,
        map_lat: document.getElementById('lp-map-lat').value,
        map_lng: document.getElementById('lp-map-lng').value,
        
        // Footer
        copyright: document.getElementById('lp-copyright').value
    };
    
    fetch(`${baseUrl}/api/landing-page`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(content)
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            statusEl.textContent = '✓ Landing page content saved successfully!';
            statusEl.className = 'text-center py-3 rounded-lg text-sm font-semibold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30';
            statusEl.classList.remove('hidden');
            setTimeout(() => statusEl.classList.add('hidden'), 3000);
        } else {
            throw new Error(data.error || 'Failed to save');
        }
    })
    .catch(err => {
        statusEl.textContent = '✗ Failed to save: ' + err.message;
        statusEl.className = 'text-center py-3 rounded-lg text-sm font-semibold bg-rose-500/20 text-rose-400 border border-rose-500/30';
        statusEl.classList.remove('hidden');
        setTimeout(() => statusEl.classList.add('hidden'), 3000);
    });
}

// Auto-load when view is displayed
document.addEventListener('DOMContentLoaded', () => {
    if (document.getElementById('view-landing-page')) {
        loadLandingPageContent();
    }
});
</script>
