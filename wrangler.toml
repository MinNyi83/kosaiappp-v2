name = "cctv-service-system"
main = "src/index.ts"
compatibility_date = "2026-07-04"
compatibility_flags = [ "nodejs_compat" ]


[[d1_databases]]
binding = "DB"
database_name = "cctv-fsm-db"
database_id = "a887d01b-41ac-4ef7-9e9d-464a3f52f15b"

# Non-sensitive vars only. Secrets go in .dev.vars (local) or Cloudflare dashboard (production)
[vars]
ADMIN_EMAIL = "nyinyimin2007@gmail.com"

# IMPORTANT: Secrets must be set via:
# - Local dev: .dev.vars file (not committed to git)
# - Production: Cloudflare Dashboard > Workers > Settings > Variables
# Required secrets: JWT_SECRET, CSRF_SECRET, GOOGLE_CLIENT_ID, GEMINI_API_KEY,
#                  TELEGRAM_BOT_TOKEN, GOOGLE_CLIENT_SECRET, GOOGLE_REFRESH_TOKEN

[triggers]
crons = ["0 0 * * *"]

[ai]
binding = "AI"

[assets]
directory = "./public"
