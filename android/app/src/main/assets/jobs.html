<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs Dashboard - Awesome Myanmar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#f59e0b',
                            dark: '#09090b',
                            panel: '#121218'
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { scroll-behavior: smooth; }
        
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background: radial-gradient(circle at top right, rgba(245, 158, 11, 0.05), transparent 45%),
                        radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.05), transparent 40%),
                        #09090b;
        }
        
        .glass-panel {
            background: rgba(18, 18, 24, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .status-pending { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); }
        .status-in-progress { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
        .status-completed { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-cancelled { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        
        .filter-btn.active { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border-color: rgba(245, 158, 11, 0.5); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <!-- Header -->
    <header class="border-b border-white/5 bg-black/30 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-amber-500 text-xl">⚙️</span>
                <span class="font-extrabold text-white tracking-wider text-sm uppercase">Awesome Myanmar</span>
            </div>
            <nav class="flex items-center gap-4 text-xs font-bold uppercase tracking-wider">
                <a href="/" class="text-slate-400 hover:text-white transition">Home</a>
                <a href="/jobs.html" class="text-amber-500">Jobs</a>
                <a href="/portal.html" class="text-slate-400 hover:text-white transition">Portal</a>
                <a href="/admin.html" class="bg-amber-500/10 border border-amber-500/30 hover:bg-amber-500/20 text-amber-500 px-3 py-1.5 rounded-lg transition">Admin</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Stats Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-panel p-4 rounded-xl text-center">
                <p class="text-2xl font-black text-white" id="total-jobs">0</p>
                <p class="text-xs text-slate-400 uppercase tracking-wider">Total Jobs</p>
            </div>
            <div class="glass-panel p-4 rounded-xl text-center">
                <p class="text-2xl font-black text-yellow-400" id="pending-jobs">0</p>
                <p class="text-xs text-slate-400 uppercase tracking-wider">Pending</p>
            </div>
            <div class="glass-panel p-4 rounded-xl text-center">
                <p class="text-2xl font-black text-blue-400" id="in-progress-jobs">0</p>
                <p class="text-xs text-slate-400 uppercase tracking-wider">In Progress</p>
            </div>
            <div class="glass-panel p-4 rounded-xl text-center">
                <p class="text-2xl font-black text-green-400" id="completed-jobs">0</p>
                <p class="text-xs text-slate-400 uppercase tracking-wider">Completed</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="filterJobs('all')" class="filter-btn active px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 transition" data-filter="all">All</button>
            <button onclick="filterJobs('Pending')" class="filter-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition" data-filter="Pending">Pending</button>
            <button onclick="filterJobs('In Progress')" class="filter-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition" data-filter="In Progress">In Progress</button>
            <button onclick="filterJobs('Completed')" class="filter-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition" data-filter="Completed">Completed</button>
            <button onclick="filterJobs('Cancelled')" class="filter-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-white/10 text-slate-400 hover:text-white transition" data-filter="Cancelled">Cancelled</button>
        </div>

        <!-- Search -->
        <div class="mb-6">
            <input type="text" id="search-input" placeholder="Search by Job ID, Client, or Technician..." class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:border-amber-500 transition">
        </div>

        <!-- Jobs List -->
        <div id="jobs-container" class="space-y-4">
            <div class="text-center py-16">
                <div class="animate-pulse text-amber-500 font-bold uppercase text-xs tracking-widest">Loading jobs...</div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-16">
            <div class="text-4xl mb-4">📋</div>
            <p class="text-slate-400 text-sm">No jobs found</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 bg-black/50 py-6 mt-8">
        <div class="max-w-6xl mx-auto px-4 text-center text-xs text-slate-500">
            <p>&copy; 2026 Awesome Myanmar CCTV & Network Infrastructure Solutions</p>
        </div>
    </footer>

    <script>
        const API_BASE_URL = window.location.origin;
        let allJobs = [];
        let currentFilter = 'all';

        async function fetchJobs() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/jobs`);
                if (!res.ok) throw new Error('Failed to fetch jobs');
                const data = await res.json();
                allJobs = data.value || data || [];
                updateStats();
                renderJobs();
            } catch (err) {
                console.error('Error fetching jobs:', err);
                document.getElementById('jobs-container').innerHTML = `
                    <div class="text-center py-16">
                        <div class="text-4xl mb-4">⚠️</div>
                        <p class="text-red-400 text-sm">Failed to load jobs</p>
                        <p class="text-slate-500 text-xs mt-2">${err.message}</p>
                    </div>
                `;
            }
        }

        function updateStats() {
            const total = allJobs.length;
            const pending = allJobs.filter(j => j.status === 'Pending').length;
            const inProgress = allJobs.filter(j => j.status === 'In Progress').length;
            const completed = allJobs.filter(j => j.status === 'Completed').length;

            document.getElementById('total-jobs').textContent = total;
            document.getElementById('pending-jobs').textContent = pending;
            document.getElementById('in-progress-jobs').textContent = inProgress;
            document.getElementById('completed-jobs').textContent = completed;
        }

        function filterJobs(status) {
            currentFilter = status;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.filter === status) {
                    btn.classList.add('active');
                }
            });
            
            renderJobs();
        }

        function renderJobs() {
            const container = document.getElementById('jobs-container');
            const emptyState = document.getElementById('empty-state');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();

            let filteredJobs = allJobs;

            if (currentFilter !== 'all') {
                filteredJobs = filteredJobs.filter(j => j.status === currentFilter);
            }

            if (searchTerm) {
                filteredJobs = filteredJobs.filter(j => 
                    (j.id && j.id.toLowerCase().includes(searchTerm)) ||
                    (j.company_name && j.company_name.toLowerCase().includes(searchTerm)) ||
                    (j.tech_name && j.tech_name.toLowerCase().includes(searchTerm)) ||
                    (j.service_type && j.service_type.toLowerCase().includes(searchTerm))
                );
            }

            if (filteredJobs.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.innerHTML = filteredJobs.map((job, index) => `
                <div class="glass-panel p-5 rounded-xl fade-in" style="animation-delay: ${index * 0.05}s">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="text-xs font-mono text-slate-500">${job.id}</span>
                                <span class="status-${getStatusClass(job.status)} px-2 py-0.5 rounded text-[10px] font-bold uppercase">${job.status}</span>
                                <span class="text-[10px] font-bold uppercase tracking-wider text-slate-500 bg-white/5 px-2 py-0.5 rounded">${job.service_type}</span>
                            </div>
                            <h3 class="text-white font-bold text-sm mb-1">${job.company_name || 'Unknown Client'}</h3>
                            <p class="text-slate-400 text-xs line-clamp-2">${job.job_description || 'No description'}</p>
                        </div>
                        <div class="flex flex-col md:flex-row md:items-center gap-3 md:gap-6 text-xs">
                            <div class="flex items-center gap-2">
                                <span class="text-slate-500">👷</span>
                                <span class="text-slate-300">${job.tech_name || 'Unassigned'}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-slate-500">📍</span>
                                <span class="text-slate-300">${job.address || 'N/A'}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-slate-500">🕐</span>
                                <span class="text-slate-300">${formatDate(job.created_at)}</span>
                            </div>
                        </div>
                    </div>
                    ${job.technician_notes ? `
                        <div class="mt-3 pt-3 border-t border-white/5">
                            <p class="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Technician Notes</p>
                            <p class="text-xs text-slate-300">${job.technician_notes}</p>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function getStatusClass(status) {
            switch(status) {
                case 'Pending': return 'pending';
                case 'In Progress': return 'in-progress';
                case 'Completed': return 'completed';
                case 'Cancelled': return 'cancelled';
                default: return 'pending';
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        document.getElementById('search-input').addEventListener('input', renderJobs);

        fetchJobs();
        setInterval(fetchJobs, 30000);
    </script>
</body>
</html>
