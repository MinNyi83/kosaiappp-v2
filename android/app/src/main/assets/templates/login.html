    <div class="login-card" style="position: relative;">
      <button class="btn-close-login" onclick="hidePortalLogin()" aria-label="Close Portal Login">&times;</button>
      <div class="login-header-group">
        <span class="login-logo">
          <!-- Wrench & Screwdriver SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        </span>
        <h2>Sign in to AwesomeMyanmar</h2>
        <p>Enter your credentials to access the portal</p>
      </div>

      <div class="login-error-msg" id="loginErrorMsg">Invalid email or password.</div>

      <form id="loginForm" onsubmit="handleLoginSubmit(event)">
        <div style="display: flex; flex-direction: column; gap: 1rem;">
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" placeholder="e.g. admin@awesomemyanmar.com" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn-primary" style="justify-content: center; padding: 0.65rem; font-size: 0.95rem; margin-top: 0.5rem;">
            Sign In
          </button>
        </div>
      </form>      
    </div>
