<div class="pos-container">
  <!-- Left Side: Catalog -->
  <div class="pos-catalog-section">
    <div class="pos-catalog-header">
      <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="text" id="posSearchInput" placeholder="Search products by name/SKU..." onkeyup="filterPOSProducts()">
      </div>
      <div class="pos-category-filters" id="posCategoryFilters">
        <button class="category-pill active" onclick="filterPOSByCategory('all')">All</button>
        <button class="category-pill" onclick="filterPOSByCategory('Networking')">Networking</button>
        <button class="category-pill" onclick="filterPOSByCategory('Storage')">Storage</button>
        <button class="category-pill" onclick="filterPOSByCategory('CCTV')">CCTV</button>
      </div>
    </div>
    
    <div class="pos-products-grid" id="posProductsGrid">
      <!-- Injected by JavaScript -->
    </div>
  </div>

  <!-- Right Side: Cart & Checkout -->
  <div class="pos-cart-section">
    <div class="pos-cart-header">
      <h2>Shopping Cart</h2>
      <div class="pos-held-orders-container" id="posHeldOrdersBadge">
        <!-- Held cart count and recall button -->
      </div>
    </div>

    <div class="pos-cart-body">
      <!-- Customer Information -->
      <div class="form-group" style="margin-bottom: 0.75rem;">
        <label for="posCustomerName" style="font-size: 0.75rem; color: var(--text-secondary);">Customer Name</label>
        <input type="text" id="posCustomerName" value="Walk-in Customer" placeholder="e.g. Ko Phyo">
      </div>

      <!-- Scrollable Cart Items List -->
      <div class="pos-cart-items-wrapper" id="posCartItemsList">
        <!-- Injected by JavaScript -->
      </div>
    </div>

    <div class="pos-cart-footer">
      <!-- Totals & Taxes -->
      <div class="pos-summary-row">
        <span>Subtotal</span>
        <span id="posSubtotal" class="mono-text">$0.00</span>
      </div>
      <div class="pos-summary-row inline-edit-row">
        <span>Discount (%)</span>
        <input type="number" id="posDiscountInput" value="0" min="0" max="100" onchange="calculatePOSTotals()" style="width: 60px; text-align: right;">
      </div>
      <div class="pos-summary-row inline-edit-row">
        <span>Tax (%)</span>
        <input type="number" id="posTaxInput" value="5" min="0" max="100" onchange="calculatePOSTotals()" style="width: 60px; text-align: right;">
      </div>
      
      <div class="pos-divider"></div>
      
      <div class="pos-summary-row total-row">
        <span>Grand Total</span>
        <span id="posGrandTotal" class="mono-text">$0.00</span>
      </div>

      <!-- Currency Switcher -->
      <div class="pos-currency-switch">
        <label style="font-size: 0.75rem; color: var(--text-secondary);">Checkout Currency</label>
        <div class="currency-pills-group">
          <button id="posCurrUSD" class="curr-pill active" onclick="setPOSCurrency('USD')">USD</button>
          <button id="posCurrMMK" class="curr-pill" onclick="setPOSCurrency('MMK')">MMK</button>
        </div>
      </div>

      <!-- Split Payments -->
      <div style="margin-top: 0.75rem; margin-bottom: 0.75rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem;">
          <label style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 600;">Payment Breakdown splits</label>
          <button type="button" class="btn-secondary" style="font-size: 0.65rem; padding: 0.15rem 0.35rem;" onclick="addPOSPaymentSplitRow()">+ Add Split</button>
        </div>
        <div id="posPaymentSplitsContainer" style="display: flex; flex-direction: column; gap: 0.35rem; max-height: 180px; overflow-y: auto;">
          <!-- Splits injected here -->
        </div>
      </div>

      <!-- Splits Allocation Summary -->
      <div style="background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 4px; padding: 0.5rem; margin-bottom: 0.75rem; font-size: 0.75rem;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 0.2rem;">
          <span>Cart Total:</span>
          <span id="posSplitTargetTotal" class="mono-text">$0.00</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 0.2rem;">
          <span>Allocated Splits:</span>
          <span id="posSplitAllocatedTotal" class="mono-text">$0.00</span>
        </div>
        <div style="display: flex; justify-content: space-between; font-weight: bold;">
          <span>Unpaid Balance:</span>
          <span id="posSplitBalanceTotal" class="mono-text" style="color: var(--color-danger);">$0.00</span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="pos-action-buttons">
        <button class="btn-secondary" onclick="holdPOSOrder()" style="flex: 1;">Hold</button>
        <button class="btn-danger-outline" onclick="clearPOSCart()" style="padding: 0.5rem 0.75rem;">Clear</button>
        <button class="btn-primary" onclick="processPOSSale()" style="flex: 2; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Pay & Receipt
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Held Carts Modal -->
<div class="modal-overlay" id="posHeldCartsModal">
  <div class="modal-card" style="max-width: 500px;">
    <div class="modal-header">
      <h3>Held Orders</h3>
      <button class="modal-close" onclick="closeModal('posHeldCartsModal')">&times;</button>
    </div>
    <div class="modal-body" id="posHeldCartsBody" style="max-height: 400px; overflow-y: auto;">
      <!-- JavaScript injected list of held carts -->
    </div>
  </div>
</div>

<!-- Receipt Modal -->
<div class="modal-overlay" id="posReceiptModal">
  <div class="modal-card" style="max-width: 400px; padding: 1.5rem; background-color: #ffffff; color: #000000; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
    <div class="modal-header" style="border-bottom: 1px dashed #cccccc; padding-bottom: 0.75rem; margin-bottom: 0.75rem;">
      <h3 style="color: #000000; font-weight: 700;">Receipt Preview</h3>
      <button class="modal-close" onclick="closePOSReceiptModal()" style="color: #000000; font-size: 1.5rem;">&times;</button>
    </div>
    <div class="modal-body" id="posReceiptContent" style="font-family: 'Courier New', Courier, monospace; font-size: 0.875rem; color: #000000;">
      <!-- Populated dynamically -->
    </div>
    <div class="modal-footer" style="border-top: 1px dashed #cccccc; padding-top: 0.75rem; display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem;">
      <button type="button" class="btn-secondary" onclick="closePOSReceiptModal()" style="color: #333; background: #e4e4e7; border: 1px solid #d4d4d8;">Close</button>
      <button type="button" class="btn-primary" onclick="printPOSReceipt()" style="background: #000; color: #fff; border: 1px solid #000;">Print Receipt</button>
    </div>
  </div>
</div>
