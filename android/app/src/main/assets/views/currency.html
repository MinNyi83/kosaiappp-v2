<div id="view-currency" class="space-y-8 tab-view">
    <div>
        <h1 class="text-2xl font-black text-white uppercase tracking-tight">Cash Safe Ledger</h1>
        <p class="text-xs text-slate-400 mt-1">Audit cash balances, log safe withdrawals, and manage equivalent local currencies.</p>
    </div>

    <div class="grid md:grid-cols-3 gap-8">
        <!-- Balance Summary -->
        <div class="glass-panel p-6 rounded-2xl space-y-4 md:col-span-1">
            <h2 class="text-sm font-bold text-white uppercase tracking-wider">🏦 Vault Balance Summary</h2>
            <div class="space-y-4">
                <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                    <span class="block text-[10px] text-slate-500 uppercase tracking-wider font-bold">Safe Balance (USD)</span>
                    <span id="safe-usd-balance" class="text-2xl font-bold text-amber-500">$0.00</span>
                </div>
                <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                    <span class="block text-[10px] text-slate-500 uppercase tracking-wider font-bold">Safe Balance (MMK)</span>
                    <span id="safe-mmk-balance" class="text-2xl font-bold text-slate-300">0 Ks</span>
                </div>
            </div>

            <!-- Form: Record Transaction -->
            <h2 class="text-sm font-bold text-white uppercase tracking-wider pt-4">Log Safe Transaction</h2>
            <form onsubmit="submitCashTransaction(event)" class="space-y-3">
                <div class="space-y-1">
                    <label class="block text-[9px] text-slate-400 uppercase tracking-widest font-bold">Tx Type</label>
                    <select id="cash-type" class="w-full bg-black/40 border border-white/10 rounded-lg px-2.5 py-2 text-xs text-white">
                        <option value="Deposit" class="bg-slate-900">Deposit / Inflow</option>
                        <option value="Withdrawal" class="bg-slate-900">Withdrawal / Expense</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="block text-[9px] text-slate-400 uppercase tracking-widest font-bold">Currency</label>
                    <select id="cash-currency" class="w-full bg-black/40 border border-white/10 rounded-lg px-2.5 py-2 text-xs text-white">
                        <option value="USD" class="bg-slate-900">USD (Affects USD Balance)</option>
                        <option value="USD_MMK" class="bg-slate-900">USD with rate (Affects MMK Balance)</option>
                        <option value="MMK" class="bg-slate-900">MMK (Affects MMK Balance)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="block text-[9px] text-slate-400 uppercase tracking-widest font-bold">Amount</label>
                        <input type="number" step="0.01" id="cash-amount" placeholder="e.g. 500" required class="w-full bg-black/40 border border-white/10 rounded-lg px-2.5 py-2 text-xs text-white font-mono">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[9px] text-slate-400 uppercase tracking-widest font-bold">Rate</label>
                        <input type="number" step="0.1" id="cash-rate" value="4500" required class="w-full bg-black/40 border border-white/10 rounded-lg px-2.5 py-2 text-xs text-white font-mono">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="block text-[9px] text-slate-400 uppercase tracking-widest font-bold">Linked Job ID</label>
                    <input type="text" id="cash-job-id" placeholder="JOB-201 (Optional)" class="w-full bg-black/40 border border-white/10 rounded-lg px-2.5 py-2 text-xs text-white font-mono">
                </div>
                <div class="space-y-1">
                    <label class="block text-[9px] text-slate-400 uppercase tracking-widest font-bold">Linked Inventory Batch (Optional)</label>
                    <select id="cash-batch-id" class="w-full bg-black/40 border border-white/10 rounded-lg px-2.5 py-2 text-xs text-white">
                        <option value="" class="bg-slate-900">(None / Not Linked)</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="block text-[9px] text-slate-400 uppercase tracking-widest font-bold">Notes</label>
                    <input type="text" id="cash-notes" placeholder="Transaction notes" required class="w-full bg-black/40 border border-white/10 rounded-lg px-2.5 py-2 text-xs text-white">
                </div>
                <button type="submit" class="w-full bg-amber-600 hover:bg-amber-500 py-2.5 rounded-lg text-xs font-bold text-white uppercase tracking-wider">Execute Transaction</button>
            </form>
        </div>

        <!-- Ledger Table -->
        <div class="glass-panel p-6 rounded-2xl space-y-4 md:col-span-2">
            <h2 class="text-sm font-bold text-white uppercase tracking-wider">Transaction Ledger Log</h2>
            <div class="bg-black/30 rounded-xl border border-white/5 p-4 max-h-[500px] overflow-y-auto">
                <table class="w-full text-xs text-left">
                    <thead>
                        <tr class="text-slate-500 border-b border-white/5 pb-2">
                            <th class="pb-2">Date</th>
                            <th class="pb-2">Type</th>
                            <th class="pb-2">Amount</th>
                            <th class="pb-2">Rate</th>
                            <th class="pb-2">Local Value (MMK)</th>
                            <th class="pb-2">Memo</th>
                        </tr>
                    </thead>
                    <tbody id="cash-ledger-body">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>
            <div class="flex justify-between items-center text-[10px] pt-2">
                <button type="button" onclick="changeCashPage(-1)" class="bg-white/5 border border-white/10 text-slate-300 font-bold px-3 py-1.5 rounded-lg hover:bg-white/10 disabled:opacity-50" id="btn-cash-prev">Prev</button>
                <span class="text-slate-400 font-mono" id="cash-page-indicator">Page 1 of 1</span>
                <button type="button" onclick="changeCashPage(1)" class="bg-white/5 border border-white/10 text-slate-300 font-bold px-3 py-1.5 rounded-lg hover:bg-white/10 disabled:opacity-50" id="btn-cash-next">Next</button>
            </div>
        </div>
    </div>
</div>
